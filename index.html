<html>
  <head>
    <style>
      body: {
        padding: 10vh;
      }
      #form {
        display: flex;
        justify-content: center;
      }
      .color {
        width: 70vh;
        height: 15vh;
      }
      .button {
        width: 30vh;
        height: 15vh;
        font-size: 5vh;
      }
      #box {
        margin: 10vh auto;
        width: 50vh;
        height: 50vh;
        box-shadow: 5px 5px 10px rgba(0,0,0,50%);
        border-radius: 5vh;
      }
      #clock {
        font-size: 2.5vh;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div id="form">
      <input class="color" type="color">
      <input class="button" type="button" value="Send">
    </div>
    <div id="box"></div>
    <p id="clock"></p>
    <script>
      const color = document.querySelector('input.color');
      const button = document.querySelector('input.button');
      const box = document.querySelector('#box');
      const clock = document.querySelector('#clock');
      
      const url = 'https://script.google.com/macros/s/AKfycbzAp3f5PWKGmUil7oE_YeqlAtYlQqPeeRQXRlGwLtziMa9tIKPmkT5ZLx-l1_XSvwQrCA/exec';
      
      button.addEventListener('click', () => {
        let content = {time: Date.now(), color: color.value};
        fetch(url, {method: 'POST', body: JSON.stringify(content)});
      });
      
      function schedule(time, func) {
        let delay = time - Date.now();
        setTimeout(func, delay);
      }
      function setColor(color) {
        box.style.backgroundColor = color;
      }
      function refresh() {
        fetch(url, {method: 'GET'})
          .then(res => res.json())
          .then(json => {
            schedule(json.time, () => setColor(json.color));
          });
      }
      
      let date = new Date();
      let seconds = date.getSeconds();
      seconds = Math.ceil(seconds / 10) * 10;
      date.setSeconds(seconds);
      schedule(date.getTime(), () => setInterval(refresh, 1000 * 10));
      
      function updateClock() {
        clock.innerText = new Date().toTimeString();
        window.requestAnimationFrame(updateClock);
      }
      window.requestAnimationFrame(updateClock);
    </script>
  </body>
</html>
